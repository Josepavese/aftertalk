# Aftertalk - Go Linter Configuration
# golangci-lint v2 configuration format
# CI runs this profile on every push. Keep it strict enough to catch defects,
# but avoid opinion-only rules that drown out actionable failures.

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  go: "1.25"

linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write

    govet:
      enable:
        - appends
        - assign
        - atomic
        - bools
        - buildtag
        - cgocall
        - composites
        - copylocks
        - deepequalerrors
        - defers
        - directive
        - errorsas
        - framepointer
        - httpresponse
        - ifaceassert
        - loopclosure
        - lostcancel
        - nilfunc
        - printf
        - shift
        - sigchanyzer
        - slog
        - sortslice
        - stdmethods
        - stringintconv
        - structtag
        - testinggoroutine
        - tests
        - timeformat
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedresult
        - unusedwrite

    staticcheck:
      checks:
        - all

    misspell:
      locale: US

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
    rules:
      # Allow fmt.Print and log in tests
      - linters:
          - forbidigo
        path: _test\.go
      # Allow dot imports in tests (for testify)
      - linters:
          - revive
        path: _test\.go
        text: "dot-imports"
      # Allow unchecked errors in tests
      - linters:
          - errcheck
        path: _test\.go
      # Allow shadowing in test files
      - linters:
          - govet
        path: _test\.go
        text: "shadow"
      # Test fixture structs: fields intentionally set for documentation/completeness
      - linters:
          - govet
        path: _test\.go
        text: "unusedwrite"
      # Test response structs: logical field order preferred over memory alignment
      - linters:
          - govet
        path: _test\.go
        text: "fieldalignment"

formatters:
  enable:
    - gofumpt
    - goimports

  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/Josepavese/aftertalk
