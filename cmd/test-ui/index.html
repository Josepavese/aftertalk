<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aftertalk WebRTC Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #2563eb; --success: #16a34a; --error: #dc2626; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: var(--primary); }
        .step-card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .step-number { width:28px; height:28px; background: var(--primary); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px; }
        .step-number.done { background: var(--success); }
        .status-badge { margin-left: auto; font-size:12px; padding:3px 10px; border-radius:12px; }
        .status-waiting { background:#f1f5f9; color:#64748b; }
        .status-active { background:#dbeafe; color:var(--primary); }
        .status-success { background:#dcfce7; color:var(--success); }
        .instructions { background:#f8fafc; padding:12px; border-radius:6px; margin-bottom:12px; font-size:14px; }
        input,select,button { padding:10px 14px; border:1px solid var(--border); border-radius:6px; font-size:14px; }
        button { background:var(--primary); color:white; border:none; cursor:pointer; }
        button:disabled { background:#94a3b8; }
        .input-group { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
        .input-group input,.input-group select { flex:1; min-width:150px; }
        #localAudio,#remoteAudio { width:100%; max-width:280px; background:#000; border-radius:6px; }
        .video-container { display:flex; gap:15px; justify-content:center; flex-wrap:wrap; }
        .video-box { text-align:center; }
        .video-box h4 { font-size:13px; color:#64748b; margin:8px 0; }
        #log { background:#1e293b; color:#e2e8f0; padding:12px; border-radius:6px; height:120px; overflow-y:auto; font:12px monospace; }
        .progress-bar { height:6px; background:#e2e8f0; border-radius:3px; margin:15px 0; }
        .progress-fill { height:100%; background:var(--primary); transition:width 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Aftertalk WebRTC Test</h1>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
        
        <div class="step-card" id="step1">
            <div class="step-header">
                <div class="step-number" id="step1-num">1</div>
                <div class="step-title" style="font-size:16px;font-weight:600;">Avvio Test</div>
                <span class="status-badge status-waiting" id="step1-status">In attesa</span>
            </div>
            <div class="instructions">
                <strong>Apri questa pagina in 2 browser diversi!</strong><br>
                Uno sarà Host, l'altro Speaker.
            </div>
            <div class="input-group">
                <input type="text" id="sessionId" placeholder="Session ID" value="test-1">
                <input type="text" id="userName" placeholder="Il tuo nome" value="Mario">
                <select id="userRole"><option value="host">Host</option><option value="speaker">Speaker</option></select>
            </div>
            <button id="btnStart" onclick="startTest()">🚀 Avvia</button>
        </div>
        
        <div class="step-card" id="step2">
            <div class="step-header">
                <div class="step-number" id="step2-num">2</div>
                <div class="step-title" style="font-size:16px;font-weight:600;">Connessione P2P</div>
                <span class="status-badge status-waiting" id="step2-status">In attesa</span>
            </div>
            <div id="p2pStatus" class="instructions">In attesa che l'altro utente si connetta...</div>
            <div class="video-container">
                <div class="video-box"><h4>📤 Il tuo microfono</h4><audio id="localAudio" controls autoplay muted></audio></div>
                <div class="video-box"><h4>📥 Audio remoto</h4><audio id="remoteAudio" controls autoplay></audio></div>
            </div>
        </div>
        
        <div class="step-card">
            <h4 style="margin-bottom:8px">📝 Log</h4>
            <div id="log"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8080';
        let ws = null, pc = null, localStream = null;
        let currentStep = 1;
        
        function log(type, msg) {
            const time = new Date().toLocaleTimeString();
            document.getElementById('log').innerHTML += `<div>[${time}] <span style="color:${type==='error'?'#f87171':type==='success'?'#4ade80':'#60a5fa'}">${msg}</span></div>`;
            document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
        }
        
        function setStep(step, status) {
            document.getElementById('step'+step+'-num').className = 'step-number ' + (status==='success'?'done':'');
            document.getElementById('step'+step+'-status').className = 'status-badge status-'+status;
            document.getElementById('step'+step+'-status').textContent = status==='success'?'✓ Fatto':status==='active'?'In corso':status==='error'?'✗':'';
        }
        
        async function startTest() {
            const name = document.getElementById('userName').value;
            const role = document.getElementById('userRole').value;
            if(!name) return alert('Inserisci il tuo nome');
            
            setStep(1,'active');
            log('info','Richiedo token...');
            
            try {
                // Get token from test endpoint
                const res = await fetch(`${API}/test/start`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({name, role})
                });
                const data = await res.json();
                log('info','Token ottenuto!');
                
                // Get microphone
                localStream = await navigator.mediaDevices.getUserMedia({audio:true});
                document.getElementById('localAudio').srcObject = localStream;
                log('success','Microfono attivo');
                
                // Connect to WebSocket signaling
                await connectWS(data.session_id, data.token);
                
                setStep(1,'success');
                currentStep = 2;
                document.getElementById('progress').style.width = '50%';
            } catch(e) {
                log('error','Errore: '+e.message);
                setStep(1,'error');
            }
        }
        
        async function connectWS(sessionId, token) {
            const wsUrl = `ws://${location.host}/signaling?token=${token}&sessionId=${sessionId}`;
            log('info','Connessione signaling...');
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                log('success','✅ Connesso');
                setStep(2,'active');
            };
            
            ws.onmessage = async (e) => {
                const msg = JSON.parse(e.data);
                log('info','Ricevuto: '+msg.type);
                
                if(msg.type==='offer') await handleOffer(msg.sdp);
                else if(msg.type==='answer') await handleAnswer(msg.sdp);
                else if(msg.type==='ice-candidate' && msg.candidate) 
                    await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
            };
            
            ws.onerror = () => log('error','Errore WS');
            ws.onclose = () => log('warn','Disconnesso');
            
            // Setup peer connection
            pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
            
            pc.ontrack = (e) => {
                document.getElementById('remoteAudio').srcObject = e.streams[0];
                log('success','📥 Audio remoto!');
                setStep(2,'success');
                document.getElementById('progress').style.width = '100%';
                document.getElementById('p2pStatus').innerHTML = '<b style="color:#16a34a">✓ Connesso!</b> Parla al microfono e sentrai audio nell altro browser.';
            };
            
            pc.onicecandidate = (e) => {
                if(e.candidate && ws?.readyState===WebSocket.OPEN)
                    ws.send(JSON.stringify({type:'ice-candidate',candidate:e.candidate}));
            };
            
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            
            // Create and send offer (if host)
            if(document.getElementById('userRole').value === 'host') {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                ws.send(JSON.stringify({type:'offer',sdp:offer.sdp}));
                log('info','Offer inviato');
            }
        }
        
        async function handleOffer(sdp) {
            await pc.setRemoteDescription(new RTCSessionDescription(sdp));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            ws.send(JSON.stringify({type:'answer',sdp:answer.sdp}));
            log('info','Answer inviata');
        }
        
        async function handleAnswer(sdp) {
            await pc.setRemoteDescription(new RTCSessionDescription(sdp));
            log('success','P2P Connesso!');
        }
    </script>
</body>
</html>
