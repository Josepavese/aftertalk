version: '3.8'

services:
  app:
    build: .
    container_name: aftertalk-app
    environment:
      DATABASE_PATH: /data/aftertalk.db
      HTTP_PORT: 8080
      WS_PORT: 8081
      LOG_LEVEL: info
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - aftertalk_data:/data

volumes:
  aftertalk_data:
