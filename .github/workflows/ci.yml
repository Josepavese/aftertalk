name: CI Pipeline

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'docs/**'
      - 'specs/**'
      - '*.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'docs/**'
      - 'specs/**'
      - '*.md'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25']
        os: [ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage_unit.out -covermode=atomic ./...

      - name: Run integration tests
        run: go test -v -race -coverprofile=coverage_integration.out -covermode=atomic ./internal/storage/sqlite/... -run TestDB_

      - name: Run E2E tests
        if: ${{ hashFiles('e2e/**/*.go') != '' }}
        run: go test -v -race ./e2e/... -timeout=5m

      - name: Generate coverage report
        run: |
          go tool cover -html=coverage_unit.out -o coverage_unit.html
          go tool cover -html=coverage_integration.out -o coverage_integration.html
          {
            echo "mode: atomic"
            tail -n +2 coverage_unit.out
            tail -n +2 coverage_integration.out
          } > coverage_total.out
          go tool cover -func=coverage_total.out > coverage_total.txt

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage_unit.out,./coverage_integration.out
          flags: unittests,integrationtests
          name: codecov-umbrella

      - name: Upload coverage to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}-go${{ matrix.go-version }}
          path: |
            coverage_unit.out
            coverage_integration.out
            coverage_unit.html
            coverage_integration.html
            coverage_total.txt

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build application
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w"
          LDFLAGS="${LDFLAGS} -X github.com/Josepavese/aftertalk/internal/version.Commit=${GITHUB_SHA}"
          LDFLAGS="${LDFLAGS} -X github.com/Josepavese/aftertalk/internal/version.Tag=ci"
          LDFLAGS="${LDFLAGS} -X github.com/Josepavese/aftertalk/internal/version.BuildTime=${BUILD_TIME}"
          LDFLAGS="${LDFLAGS} -X github.com/Josepavese/aftertalk/internal/version.BuildSource=github-actions-ci"
          go build -v -trimpath -ldflags="${LDFLAGS}" -o bin/aftertalk ./cmd/aftertalk
          ls -lh bin/

      - name: Build Docker image
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          docker build -t aftertalk:ci -f Dockerfile \
            --build-arg AFTERTALK_COMMIT="${GITHUB_SHA}" \
            --build-arg AFTERTALK_TAG=ci \
            --build-arg AFTERTALK_BUILD_TIME="${BUILD_TIME}" \
            --build-arg AFTERTALK_BUILD_SOURCE=github-actions-ci \
            .
          docker save aftertalk:ci | gzip > aftertalk-ci.tar.gz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            bin/aftertalk
            aftertalk-ci.tar.gz

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gosec Security Scanner
        continue-on-error: true
        uses: securego/gosec@master
        with:
          args: -exclude=G115 ./...

      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker credentials
        id: docker_auth
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker credentials not configured: skipping image push."
          fi

      - name: Login to Docker Hub
        if: steps.docker_auth.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        if: steps.docker_auth.outputs.enabled == 'true'
        uses: docker/metadata-action@v5
        with:
          images: Josepavese/aftertalk
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Resolve build time
        id: build_time
        if: steps.docker_auth.outputs.enabled == 'true'
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: steps.docker_auth.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AFTERTALK_COMMIT=${{ github.sha }}
            AFTERTALK_TAG=${{ github.ref_name }}
            AFTERTALK_BUILD_TIME=${{ steps.build_time.outputs.value }}
            AFTERTALK_BUILD_SOURCE=github-actions-docker
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-smoke-test:
    name: Container Smoke Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Load Docker image artifact
        run: |
          gunzip -c aftertalk-ci.tar.gz | docker load

      - name: Start application container
        run: |
          docker run -d --name aftertalk-smoke \
            -p 8080:8080 \
            -e AFTERTALK_DATABASE_PATH=/var/lib/aftertalk/aftertalk_test.db \
            -e AFTERTALK_API_KEY=smoke-test-api-key-12345 \
            -e AFTERTALK_JWT_SECRET=smoke-test-jwt-secret-change-me-in-prod \
            aftertalk:ci

      - name: Wait for application to start
        run: |
          for i in {1..30}; do
            if curl -f -H "Authorization: Bearer smoke-test-api-key-12345" http://localhost:8080/v1/health; then
              echo "Application is ready!"
              exit 0
            fi
            sleep 2
          done
          echo "Application did not start in time"
          exit 1

      - name: Test health endpoint
        run: |
          curl -f -H "Authorization: Bearer smoke-test-api-key-12345" http://localhost:8080/v1/health
          echo ""

      - name: Test ready endpoint
        run: |
          curl -f -H "Authorization: Bearer smoke-test-api-key-12345" http://localhost:8080/v1/ready
          echo ""

      - name: Test session creation
        run: |
          SESSION_RESPONSE=$(curl -X POST http://localhost:8080/v1/sessions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer smoke-test-api-key-12345" \
            -d '{
              "participant_count": 2,
              "participants": [
                {"user_id": "user1", "role": "client"},
                {"user_id": "user2", "role": "professional"}
              ]
            }')

          echo "$SESSION_RESPONSE" | jq .
          SESSION_ID=$(echo "$SESSION_RESPONSE" | jq -r '.session_id')
          echo "Session ID: $SESSION_ID"

          if [ -z "$SESSION_ID" ] || [ "$SESSION_ID" == "null" ]; then
            echo "Failed to create session"
            exit 1
          fi

          # Test session retrieval
          curl -f http://localhost:8080/v1/sessions/$SESSION_ID \
            -H "Authorization: Bearer smoke-test-api-key-12345"

      - name: Test metrics endpoint
        run: |
          if curl -fsS http://localhost:8080/metrics >/dev/null; then
            echo "Metrics endpoint available"
          else
            echo "Metrics endpoint not exposed in this runtime profile (non-blocking)"
          fi

      - name: Print container logs on failure
        if: failure()
        run: docker logs aftertalk-smoke || true

      - name: Stop container
        if: always()
        run: docker rm -f aftertalk-smoke || true

  notification:
    name: Build Notification
    runs-on: ubuntu-latest
    needs: [lint, test, security, build, container-smoke-test]
    if: always()

    steps:
      - name: Build status
        run: |
          if [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.test.result }}" == "success" ] && \
             [ "${{ needs.security.result }}" == "success" ] && \
             [ "${{ needs.build.result }}" == "success" ] && \
             [ "${{ needs.container-smoke-test.result }}" == "success" ]; then
            echo "✅ All tests passed! Build is successful."
            exit 0
          else
            echo "❌ Pipeline failed."
            echo "lint=${{ needs.lint.result }}"
            echo "test=${{ needs.test.result }}"
            echo "security=${{ needs.security.result }}"
            echo "build=${{ needs.build.result }}"
            echo "container-smoke-test=${{ needs.container-smoke-test.result }}"
            exit 1
          fi
