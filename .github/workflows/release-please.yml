name: Release Please

# Creates or updates SDK release PRs from Conventional Commits on master.
# When a release PR is merged, release-please creates the Git tag, which
# triggers sdk-ts-publish.yml or sdk-php-publish.yml automatically.

on:
  push:
    branches: [master]
    paths:
      - "sdk/ts/**"
      - "sdk/php/**"
      - ".github/release-please/**"
      - ".github/workflows/release-please.yml"

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release_please
        continue-on-error: true
        uses: googleapis/release-please-action@v5
        with:
          config-file: .github/release-please/config.json
          manifest-file: .github/release-please/manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Release Please status
        if: steps.release_please.outcome == 'failure'
        run: |
          echo "release-please failed (likely repository PR-creation policy)."
          echo "This workflow is non-blocking; verify release PRs manually if needed."
