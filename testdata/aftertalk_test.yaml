database:
  path: /tmp/aftertalk_test.db

http:
  host: 0.0.0.0
  port: 8080

websocket:
  host: 0.0.0.0
  port: 8081

logging:
  level: info
  format: json

jwt:
  secret: aftertalk-test-secret-changed-2025
  issuer: aftertalk
  expiration: 2h

api:
  key: test-api-key-12345

stt:
  provider: google

llm:
  provider: openai

processing:
  maxConcurrentTranscriptions: 5
  maxConcurrentMinutesGenerations: 3

session:
  maxDuration: 1h
  maxParticipantsPerSession: 10

retention:
  transcriptionDays: 30
  minutesDays: 30
  webhookEventsDays: 7

performance:
  enableProfiling: true
  profilingPort: 6060
